<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Дилеммы · выбор начинается с вопроса</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Фоновые декоративные сферы -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="container">
        <div class="hero-image">
            <img src="https://media.discordapp.net/attachments/1238819661567496193/1503759273253933126/image.png?ex=6a048475&is=6a0332f5&hm=4a8a5fdca3819248e8a014d57e4d392a3d3caa40272af0c8c594dc380fcf0a06&=&format=webp&quality=lossless&width=1172&height=357" 
                 alt="Моральный выбор | Весы" 
                 class="hero-img">
            <div class="hero-text">
                <h1>Этические дилеммы</h1>
            </div>
        </div>

        <!-- РЕЖИМЫ: список и детальный просмотр -->
        <div id="listView" class="dilemmas-list-view">
            <div id="dilemmasGrid" class="dilemmas-grid"></div>
        </div>

        <div id="detailView" style="display: none;">
            <button id="backToListBtn" class="back-button"><i class="fas fa-arrow-left"></i> Ко всем дилеммам</button>
            <div id="detailCard" class="detail-card-container"></div>
        </div>

        <footer>
            <i class="fas fa-brain"></i> Ни одного правильного ответа — только твои ценности
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
